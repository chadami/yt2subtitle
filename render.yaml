services:
  - type: keyvalue
    name: youtube-ai-subtitle-redis
    plan: free
    ipAllowList: []

  - type: web
    name: youtube-ai-subtitle-api
    runtime: node
    plan: free
    buildCommand: npm ci --include=dev && npm --workspace backend run build
    startCommand: npm --workspace backend run start:all
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: youtube-ai-subtitle-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: youtube-ai-subtitle-redis
          property: connectionString
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PUBLIC_APP_URL
        value: https://yt.invisiblewind.cn
      - key: EXTENSION_ORIGIN
        sync: false
      - key: EMAIL_PROVIDER
        value: resend
      - key: EMAIL_FROM
        value: noreply@yt.invisiblewind.cn
      - key: RESEND_API_KEY
        sync: false

databases:
  - name: youtube-ai-subtitle-db
    plan: free
