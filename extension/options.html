<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube AI Subtitle Settings</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f4;
        --panel: #ffffff;
        --ink: #1c211f;
        --muted: #66706b;
        --line: #dfe5df;
        --accent: #286f5a;
        --accent-strong: #154f42;
        --accent-soft: #e3f2ec;
        --danger: #9f2f30;
        --shadow: 0 18px 50px rgba(35, 52, 44, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font: 14px/1.5 Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .shell {
        width: min(920px, calc(100vw - 32px));
        margin: 28px auto 48px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1,
      h2 {
        margin: 0;
        letter-spacing: 0;
      }

      h1 {
        font-size: 24px;
        line-height: 1.15;
      }

      h2 {
        font-size: 15px;
      }

      .subtitle {
        margin: 6px 0 0;
        color: var(--muted);
      }

      .status-pill {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: var(--panel);
        color: var(--muted);
        padding: 6px 12px;
        white-space: nowrap;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      section {
        display: grid;
        grid-template-columns: 210px 1fr;
        gap: 24px;
        padding: 24px;
        border-top: 1px solid var(--line);
      }

      section:first-child {
        border-top: 0;
      }

      .section-copy {
        color: var(--muted);
        margin: 6px 0 0;
      }

      .fields {
        display: grid;
        gap: 14px;
      }

      label {
        display: grid;
        gap: 7px;
        color: var(--muted);
        font-weight: 600;
      }

      input,
      select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 7px;
        background: #fbfcfb;
        color: var(--ink);
        font: inherit;
        padding: 10px 11px;
        outline: none;
      }

      input:focus,
      select:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(40, 111, 90, 0.14);
      }

      .inline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px 14px;
      }

      .inline label {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--ink);
        font-weight: 600;
      }

      .inline input {
        width: 18px;
        height: 18px;
      }

      .actions {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }

      button {
        border: 1px solid transparent;
        border-radius: 7px;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        min-height: 38px;
        padding: 8px 14px;
      }

      button:hover {
        background: var(--accent-strong);
      }

      button.secondary {
        background: #fff;
        border-color: var(--line);
        color: var(--ink);
      }

      button.secondary:hover {
        border-color: #bdcbc2;
        background: #f7faf8;
      }

      button.danger {
        background: #fff;
        border-color: #efcfce;
        color: var(--danger);
      }

      button.danger:hover {
        background: #fff6f6;
      }

      .account-card {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
      }

      .email-display {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .email-value {
        min-width: 0;
        font-size: 16px;
        font-weight: 750;
        overflow-wrap: anywhere;
      }

      .message {
        min-height: 22px;
        margin: 14px 0 0;
        color: var(--muted);
      }

      .hidden {
        display: none !important;
      }

      footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 16px;
      }

      @media (max-width: 720px) {
        header,
        section,
        footer {
          display: grid;
          grid-template-columns: 1fr;
        }

        section {
          gap: 16px;
          padding: 20px;
        }

        .email-display {
          display: grid;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <h1>YouTube AI Subtitle</h1>
          <p class="subtitle">Settings</p>
        </div>
        <div id="accountStatus" class="status-pill">Checking account</div>
      </header>

      <div class="panel">
        <section>
          <div>
            <h2>Account</h2>
            <p class="section-copy">Email login</p>
          </div>
          <div class="fields">
            <div id="accountLoggedIn" class="account-card hidden">
              <div class="email-display">
                <div>
                  <div class="section-copy">Signed in as</div>
                  <div id="accountEmail" class="email-value"></div>
                </div>
                <button id="logout" class="danger">Log out</button>
              </div>
            </div>

            <div id="accountLoggedOut" class="fields">
              <label>Email
                <input id="email" type="email" placeholder="you@example.com" autocomplete="email" />
              </label>
              <div class="actions">
                <button id="sendMagicLink">Send login link</button>
              </div>
              <label>Login code
                <input id="loginCode" placeholder="Code from email page" autocomplete="one-time-code" />
              </label>
              <div class="actions">
                <button id="exchangeLoginCode" class="secondary">Log in with code</button>
              </div>
            </div>
          </div>
        </section>

        <section>
          <div>
            <h2>Service</h2>
            <p class="section-copy">Backend connection</p>
          </div>
          <div class="fields">
            <label>Backend API URL
              <input id="apiBase" placeholder="https://subtitle.invisiblewind.cn" />
            </label>
            <div class="actions">
              <button id="testConnection" class="secondary">Test connection</button>
            </div>
          </div>
        </section>

        <section>
          <div>
            <h2>Translation</h2>
            <p class="section-copy">Subtitle behavior</p>
          </div>
          <div class="fields">
            <label>Target language
              <input id="targetLang" value="zh-Hans" />
            </label>
            <div class="inline">
              <label><input id="autoLoad" type="checkbox" /> Auto-load completed AI subtitles</label>
            </div>
          </div>
        </section>

        <section>
          <div>
            <h2>Cache</h2>
            <p class="section-copy">Local task state</p>
          </div>
          <div class="actions">
            <button id="clearCache" class="secondary">Clear local cache</button>
          </div>
        </section>
      </div>

      <footer>
        <p id="message" class="message"></p>
        <button id="save">Save settings</button>
      </footer>
    </main>
    <script src="options.js"></script>
  </body>
</html>
