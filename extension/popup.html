<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: #ffffff;
        --surface: #f7f7f5;
        --surface-hover: #efefed;
        --panel: #ffffff;
        --ink: #2f2f2f;
        --muted: #787774;
        --line: #e6e4e1;
        --line-strong: #d8d6d2;
        --accent: #2f2f2f;
        --accent-strong: #1f1f1f;
        --accent-soft: #f1f1ef;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 340px;
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font: 13px/1.45 ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      }

      .wrap {
        padding: 15px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 13px;
      }

      .mark {
        width: 32px;
        height: 32px;
        border-radius: 5px;
        background: var(--surface);
        border: 1px solid var(--line);
        display: grid;
        place-items: center;
        color: var(--ink);
        font-weight: 650;
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        font-size: 16px;
        line-height: 1.15;
        letter-spacing: 0;
        font-weight: 650;
      }

      .caption {
        margin: 3px 0 0;
        color: var(--muted);
      }

      .status {
        min-height: 56px;
        border: 1px solid var(--line);
        border-radius: 4px;
        background: var(--panel);
        color: var(--muted);
        padding: 10px 11px;
        overflow-wrap: anywhere;
      }

      .actions {
        display: grid;
        gap: 7px;
        margin-top: 11px;
      }

      .controls {
        display: grid;
        gap: 13px;
        margin-top: 11px;
        border: 1px solid var(--line);
        border-radius: 4px;
        background: var(--panel);
        padding: 12px;
      }

      .control {
        display: grid;
        gap: 6px;
      }

      .control-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 500;
      }

      .value {
        color: var(--ink);
        font-variant-numeric: tabular-nums;
        font-weight: 500;
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      .segments {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px;
        border: 1px solid var(--line);
        border-radius: 4px;
        background: var(--surface);
        padding: 2px;
      }

      .segments input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .segments label {
        border: 1px solid transparent;
        border-radius: 3px;
        cursor: pointer;
        padding: 6px 8px;
        text-align: center;
        color: var(--muted);
        font-weight: 500;
      }

      .segments input:checked + span {
        color: var(--ink);
      }

      .segments label:has(input:checked) {
        background: #ffffff;
        border-color: var(--line);
      }

      button {
        width: 100%;
        min-height: 36px;
        border: 1px solid var(--line);
        border-radius: 4px;
        cursor: pointer;
        font: inherit;
        font-weight: 500;
        letter-spacing: 0;
      }

      button.primary {
        background: var(--surface);
        color: var(--ink);
      }

      button.primary:hover:not(:disabled) {
        background: var(--surface-hover);
        border-color: var(--line-strong);
      }

      button.secondary {
        background: #ffffff;
        border-color: var(--line);
        color: var(--ink);
      }

      button.secondary:hover {
        background: var(--surface);
        border-color: var(--line-strong);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .hidden {
        display: none !important;
      }

      button .spinner {
        display: none;
        width: 14px;
        height: 14px;
        margin-right: 8px;
        border: 2px solid currentColor;
        border-right-color: transparent;
        border-radius: 50%;
        vertical-align: -2px;
        animation: spin 0.75s linear infinite;
      }

      button.loading .spinner {
        display: inline-block;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="mark">AI</div>
        <div>
          <h1>YouTube AI Subtitle</h1>
          <p class="caption" data-i18n="caption">Translate current video</p>
        </div>
      </header>

      <div id="status" class="status">Checking current video...</div>

      <div class="controls hidden">
        <div class="control">
          <div class="control-head">
            <span data-i18n="fontSize">Font size</span>
            <span id="fontSizeValue" class="value">24px</span>
          </div>
          <input id="fontSize" type="range" min="16" max="36" step="1" />
        </div>

        <div class="control">
          <div class="control-head">
            <span data-i18n="position">Position</span>
            <span id="positionValue" class="value">21%</span>
          </div>
          <input id="positionPercent" type="range" min="2" max="42" step="1" />
        </div>

        <div class="control">
          <div class="control-head">
            <span data-i18n="backgroundOpacity">Background opacity</span>
            <span id="backgroundOpacityValue" class="value">25%</span>
          </div>
          <input id="backgroundOpacity" type="range" min="15" max="95" step="1" />
        </div>
      </div>

      <div class="actions">
        <button id="generate" class="primary" disabled><span class="spinner"></span><span id="generateText" data-i18n="generate">Generate AI subtitles</span></button>
        <button id="openOptions" class="secondary" data-i18n="settings">Settings</button>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
