<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: #f5f7f3;
        --panel: #fbfcf8;
        --ink: #17211d;
        --muted: #69746e;
        --line: #dce5dd;
        --accent: #246d58;
        --accent-strong: #155340;
        --accent-soft: #e5f2eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 340px;
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font: 13px/1.45 ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .wrap {
        padding: 16px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }

      .mark {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: var(--accent);
        display: grid;
        place-items: center;
        color: #f7fff9;
        font-weight: 800;
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        font-size: 16px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .caption {
        margin: 2px 0 0;
        color: var(--muted);
      }

      .status {
        min-height: 56px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--muted);
        padding: 12px;
        overflow-wrap: anywhere;
      }

      .actions {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      .controls {
        display: grid;
        gap: 12px;
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 12px;
      }

      .control {
        display: grid;
        gap: 7px;
      }

      .control-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: var(--muted);
        font-weight: 700;
      }

      .value {
        color: var(--ink);
        font-variant-numeric: tabular-nums;
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      .segments {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .segments input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .segments label {
        border: 1px solid var(--line);
        border-radius: 7px;
        cursor: pointer;
        padding: 8px 10px;
        text-align: center;
        font-weight: 750;
      }

      .segments input:checked + span {
        color: #fff;
      }

      .segments label:has(input:checked) {
        background: var(--accent);
        border-color: var(--accent);
      }

      button {
        width: 100%;
        min-height: 40px;
        border: 1px solid transparent;
        border-radius: 8px;
        cursor: pointer;
        font: inherit;
        font-weight: 750;
        letter-spacing: 0;
      }

      button.primary {
        background: var(--accent);
        color: #fff;
      }

      button.primary:hover:not(:disabled) {
        background: var(--accent-strong);
      }

      button.secondary {
        background: transparent;
        border-color: var(--line);
        color: var(--ink);
      }

      button.secondary:hover {
        background: var(--accent-soft);
        border-color: #bfd4c9;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .hidden {
        display: none !important;
      }

      button .spinner {
        display: none;
        width: 14px;
        height: 14px;
        margin-right: 8px;
        border: 2px solid currentColor;
        border-right-color: transparent;
        border-radius: 50%;
        vertical-align: -2px;
        animation: spin 0.75s linear infinite;
      }

      button.loading .spinner {
        display: inline-block;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="mark">AI</div>
        <div>
          <h1>YouTube AI Subtitle</h1>
          <p class="caption">Translate current video</p>
        </div>
      </header>

      <div id="status" class="status">Checking current video...</div>

      <div class="controls">
        <div class="control">
          <div class="control-head">
            <span>Font size</span>
            <span id="fontSizeValue" class="value">24px</span>
          </div>
          <input id="fontSize" type="range" min="16" max="36" step="1" />
        </div>

        <div class="control">
          <div class="control-head">
            <span>Position</span>
            <span id="positionValue" class="value">21%</span>
          </div>
          <input id="positionPercent" type="range" min="8" max="42" step="1" />
        </div>

        <div class="control">
          <div class="control-head">
            <span>Background opacity</span>
            <span id="backgroundOpacityValue" class="value">82%</span>
          </div>
          <input id="backgroundOpacity" type="range" min="35" max="95" step="1" />
        </div>

        <div class="control">
          <div class="control-head">
            <span>Font weight</span>
          </div>
          <div class="segments">
            <label>
              <input id="weightNormal" name="fontWeight" type="radio" value="normal" />
              <span>Normal</span>
            </label>
            <label>
              <input id="weightBold" name="fontWeight" type="radio" value="bold" />
              <span>Bold</span>
            </label>
          </div>
        </div>
      </div>

      <div class="actions">
        <button id="generate" class="primary" disabled><span class="spinner"></span><span id="generateText">Generate AI subtitles</span></button>
        <button id="openOptions" class="secondary">Settings</button>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
