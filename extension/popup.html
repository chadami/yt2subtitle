<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: #f5f7f3;
        --panel: #fbfcf8;
        --ink: #17211d;
        --muted: #69746e;
        --line: #dce5dd;
        --accent: #246d58;
        --accent-strong: #155340;
        --accent-soft: #e5f2eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 340px;
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font: 13px/1.45 ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .wrap {
        padding: 16px;
      }

      header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }

      .mark {
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: var(--accent);
        display: grid;
        place-items: center;
        color: #f7fff9;
        font-weight: 800;
        letter-spacing: 0;
      }

      h1 {
        margin: 0;
        font-size: 16px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .caption {
        margin: 2px 0 0;
        color: var(--muted);
      }

      .status {
        min-height: 56px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--muted);
        padding: 12px;
        overflow-wrap: anywhere;
      }

      .actions {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      button {
        width: 100%;
        min-height: 40px;
        border: 1px solid transparent;
        border-radius: 8px;
        cursor: pointer;
        font: inherit;
        font-weight: 750;
        letter-spacing: 0;
      }

      button.primary {
        background: var(--accent);
        color: #fff;
      }

      button.primary:hover:not(:disabled) {
        background: var(--accent-strong);
      }

      button.secondary {
        background: transparent;
        border-color: var(--line);
        color: var(--ink);
      }

      button.secondary:hover {
        background: var(--accent-soft);
        border-color: #bfd4c9;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="mark">AI</div>
        <div>
          <h1>YouTube AI Subtitle</h1>
          <p class="caption">Translate current video</p>
        </div>
      </header>

      <div id="status" class="status">Checking current video...</div>

      <div class="actions">
        <button id="generate" class="primary" disabled>Generate AI subtitles</button>
        <button id="openOptions" class="secondary">Settings</button>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
